# GPU CBAM-ResNet50 Configuration
name: cbam_resnet50_full
description: CBAM-ResNet50 training on GPU

model_type: cbam
pretrained: true
dropout_rate: 0.5

epochs: 20
learning_rate: 0.0001
weight_decay: 0.0001
batch_size: 16
grad_clip_norm: 1.0
early_stopping_patience: 5

focal_gamma: 2.0
use_class_weights: true

image_size: 512
num_workers: 4
fold: 0

device: cuda
use_amp: true

seed: 42
